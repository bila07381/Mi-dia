<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mi Día</title>
<meta name="theme-color" content="#c8f135">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e11;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #c8f135;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --high: #ff6b4a;
    --med: #ffc93c;
    --low: #c8f135;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  .app { max-width: 480px; margin: 0 auto; padding: 24px 16px 110px; }

  header { margin-bottom: 24px; animation: fadeDown 0.5s ease both; }
  .date-label { font-size: 11px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  h1 { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; line-height: 1; }
  h1 span { color: var(--accent); }

  .stats-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 8px 14px; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .stat strong { color: var(--text); font-size: 15px; font-family: 'Syne', sans-serif; font-weight: 700; }

  /* Tabs */
  .tabs { display: flex; gap: 5px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 4px; }
  .tab { flex: 1; text-align: center; padding: 9px 4px; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--muted); border: none; background: transparent; transition: all 0.2s; }
  .tab.active { background: var(--accent); color: #0e0e11; }

  /* Calendar */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-nav h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
  .nav-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); width: 34px; height: 34px; border-radius: 10px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 20px; }
  .cal-day-label { text-align: center; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 4px 0; }
  .cal-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; gap: 2px; }
  .cal-cell:hover { background: var(--surface2); }
  .cal-cell.empty { pointer-events: none; }
  .cal-cell.today { background: var(--surface); border: 1.5px solid var(--accent); color: var(--accent); font-weight: 700; }
  .cal-cell.selected { background: var(--accent); color: #0e0e11; font-weight: 700; }
  .dots { display: flex; gap: 2px; }
  .dot-pip { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .cal-cell.selected .dot-pip { background: #0e0e11 !important; }
  .selected-day-header { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .add-day-btn { background: var(--accent); color: #0e0e11; border: none; border-radius: 8px; padding: 5px 12px; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; }

  /* Agenda */
  .agenda-group { margin-bottom: 24px; animation: slideIn 0.3s ease both; }
  .agenda-date { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .agenda-date.today-label { color: var(--accent); }
  .agenda-date::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Task card */
  .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; position: relative; overflow: hidden; animation: slideIn 0.25s ease both; }
  .task-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .task-card.alta::before { background: var(--high); }
  .task-card.media::before { background: var(--med); }
  .task-card.baja::before { background: var(--low); }
  .task-card.done { opacity: 0.35; }
  .task-card.done .task-name { text-decoration: line-through; color: var(--muted); }

  .check-btn { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: transparent; transition: all 0.2s; }
  .task-card.done .check-btn { background: var(--accent); border-color: var(--accent); color: #0e0e11; }

  .task-info { flex: 1; min-width: 0; }
  .task-name { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .task-meta { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); }

  .priority-tag { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 6px; border-radius: 100px; }
  .priority-tag.alta { background: rgba(255,107,74,0.15); color: var(--high); }
  .priority-tag.media { background: rgba(255,201,60,0.15); color: var(--med); }
  .priority-tag.baja { background: rgba(200,241,53,0.15); color: var(--low); }

  .delete-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 4px; border-radius: 6px; transition: color 0.2s; flex-shrink: 0; }
  .delete-btn:hover { color: var(--high); }

  /* ── SHOPPING LIST ── */
  .shop-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .shop-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
  .shop-title span { color: var(--accent); }

  .shop-stats { display: flex; gap: 8px; margin-bottom: 20px; }
  .shop-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 7px 12px; font-size: 12px; color: var(--muted); }
  .shop-stat strong { color: var(--text); font-family: 'Syne', sans-serif; font-weight: 700; }

  .shop-add-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .shop-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .shop-input:focus { border-color: var(--accent); }
  .shop-input::placeholder { color: var(--muted); }

  .shop-qty { width: 60px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; text-align: center; -webkit-appearance: none; }
  .shop-qty:focus { border-color: var(--accent); }

  .shop-add-btn { background: var(--accent); color: #0e0e11; border: none; border-radius: 12px; padding: 12px 16px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
  .shop-add-btn:active { transform: scale(0.95); }

  .shop-categories { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
  .shop-categories::-webkit-scrollbar { display: none; }

  .cat-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; font-family: 'DM Sans', sans-serif; }
  .cat-btn.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

  .shop-section-title { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; margin-top: 16px; display: flex; align-items: center; gap: 8px; }
  .shop-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .shop-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; animation: slideIn 0.2s ease both; }
  .shop-item.checked { opacity: 0.4; }
  .shop-item.checked .shop-item-name { text-decoration: line-through; color: var(--muted); }

  .shop-check { width: 24px; height: 24px; border-radius: 8px; border: 2px solid var(--border); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; transition: all 0.2s; }
  .shop-item.checked .shop-check { background: var(--accent); border-color: var(--accent); color: #0e0e11; }

  .shop-item-info { flex: 1; }
  .shop-item-name { font-size: 14px; font-weight: 500; }
  .shop-item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .shop-item-qty { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 3px 10px; font-size: 12px; font-weight: 600; color: var(--text); font-family: 'Syne', sans-serif; }

  .clear-checked-btn { background: transparent; border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; color: var(--muted); font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; }
  .clear-checked-btn:hover { border-color: var(--high); color: var(--high); }

  .shop-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

  /* FAB */
  .fab { position: fixed; bottom: 24px; right: 50%; transform: translateX(50%); background: var(--accent); color: #0e0e11; border: none; border-radius: 100px; padding: 14px 28px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 0 30px rgba(200,241,53,0.25); transition: all 0.2s; z-index: 100; }
  .fab:active { transform: translateX(50%) scale(0.96); }
  .fab.hidden { display: none !important; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 24px 24px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 480px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .modal h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 16px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
  .field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }

  .priority-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .priority-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 9px 6px; cursor: pointer; text-align: center; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--muted); transition: all 0.15s; }
  .priority-btn .dot { width: 7px; height: 7px; border-radius: 50%; margin: 0 auto 4px; }
  .priority-btn.alta .dot { background: var(--high); }
  .priority-btn.media .dot { background: var(--med); }
  .priority-btn.baja .dot { background: var(--low); }
  .priority-btn.alta.active { color: var(--high); background: rgba(255,107,74,0.1); border-color: var(--high); }
  .priority-btn.media.active { color: var(--med); background: rgba(255,201,60,0.1); border-color: var(--med); }
  .priority-btn.baja.active { color: var(--low); background: rgba(200,241,53,0.1); border-color: var(--low); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn-save { width: 100%; background: var(--accent); color: #0e0e11; border: none; border-radius: 12px; padding: 13px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 6px; transition: all 0.2s; }
  .btn-save:active { transform: scale(0.98); }

  /* Notif */
  .notif-banner { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-120px); background: var(--surface); border: 1px solid var(--accent); border-radius: 14px; padding: 12px 18px; display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; z-index: 999; transition: transform 0.4s cubic-bezier(0.32,0.72,0,1); box-shadow: 0 4px 24px rgba(0,0,0,0.5); max-width: 340px; width: calc(100% - 32px); }
  .notif-banner.show { transform: translateX(-50%) translateY(0); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.5; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  .hidden { display: none !important; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="date-label" id="dateLabel"></div>
    <h1>Mi <span>Día</span></h1>
    <div class="stats-row">
      <div class="stat"><strong id="totalCount">0</strong> eventos</div>
      <div class="stat"><strong id="doneCount">0</strong> hechos</div>
      <div class="stat"><strong id="upcomingCount">0</strong> próximos</div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab" onclick="switchTab('calendario')">📅 Cal</button>
    <button class="tab active" onclick="switchTab('agenda')">📋 Agenda</button>
    <button class="tab" onclick="switchTab('hoy')">⚡ Hoy</button>
    <button class="tab" onclick="switchTab('compras')">🛒 Lista</button>
  </div>

  <!-- CALENDARIO -->
  <div id="view-calendario" class="hidden">
    <div class="cal-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <h2 id="calTitle"></h2>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="selected-day-header">
      <span id="selectedDayTitle">Seleccioná un día</span>
      <button class="add-day-btn" onclick="openModal()">+ Agregar</button>
    </div>
    <div id="selectedDayTasks"></div>
  </div>

  <!-- AGENDA -->
  <div id="view-agenda"></div>

  <!-- HOY -->
  <div id="view-hoy" class="hidden"></div>

  <!-- COMPRAS -->
  <div id="view-compras" class="hidden">
    <div class="shop-header">
      <div class="shop-title">Lista de <span>Compras</span></div>
    </div>
    <div class="shop-stats">
      <div class="shop-stat"><strong id="shopTotal">0</strong> ítems</div>
      <div class="shop-stat"><strong id="shopPending">0</strong> pendientes</div>
    </div>

    <div class="shop-add-row">
      <input class="shop-input" type="text" id="shopItemName" placeholder="Agregar ítem..." />
      <input class="shop-qty" type="text" id="shopItemQty" placeholder="Cant." />
      <button class="shop-add-btn" onclick="addShopItem()">+</button>
    </div>

    <div class="shop-categories" id="shopCategories"></div>

    <div class="shop-actions">
      <span style="font-size:12px; color:var(--muted)" id="shopCatLabel">Todos los ítems</span>
      <button class="clear-checked-btn" onclick="clearChecked()">🗑 Borrar tachados</button>
    </div>

    <div id="shopList"></div>
  </div>
</div>

<!-- FAB (hidden in compras) -->
<button class="fab" id="mainFab" onclick="openModal()">
  <span style="font-size:18px">+</span> Nueva tarea
</button>

<!-- Modal tareas -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Nueva tarea</h2>
    <div class="field">
      <label>Nombre</label>
      <input type="text" id="taskName" placeholder="Ej: Reunión de trabajo..." />
    </div>
    <div class="field">
      <label>Prioridad</label>
      <div class="priority-grid">
        <button class="priority-btn alta active" onclick="setPriority('alta',this)"><div class="dot"></div>Alta</button>
        <button class="priority-btn media" onclick="setPriority('media',this)"><div class="dot"></div>Media</button>
        <button class="priority-btn baja" onclick="setPriority('baja',this)"><div class="dot"></div>Baja</button>
      </div>
    </div>
    <div class="field">
      <label>Fecha</label>
      <input type="date" id="taskDate" />
    </div>
    <div class="row2">
      <div class="field">
        <label>Hora</label>
        <input type="time" id="taskTime" />
      </div>
      <div class="field">
        <label>Recordatorio</label>
        <select id="taskAlarm">
          <option value="0">Sin recordatorio</option>
          <option value="5">5 min antes</option>
          <option value="10">10 min antes</option>
          <option value="15">15 min antes</option>
          <option value="30">30 min antes</option>
          <option value="60">1 hora antes</option>
          <option value="1440">1 día antes</option>
        </select>
      </div>
    </div>
    <button class="btn-save" onclick="saveTask()">Agregar</button>
  </div>
</div>

<div class="notif-banner" id="notifBanner">
  <span style="font-size:18px">🔔</span>
  <span id="notifText"></span>
</div>

<script>
  // ── Tasks ──
  let tasks = JSON.parse(localStorage.getItem('midia_v2_tasks') || '[]');
  let selectedPriority = 'alta';
  let currentTab = 'agenda';

  const todayObj = new Date(); todayObj.setHours(0,0,0,0);
  const todayStr = toDateStr(todayObj);
  let calYear = todayObj.getFullYear();
  let calMonth = todayObj.getMonth();
  let selectedDate = todayStr;

  const months_es = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const days_es = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const days_long = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months_long = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function toDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function formatDateLabel(str) {
    if (str === todayStr) return 'Hoy';
    const [y,m,d] = str.split('-').map(Number);
    const dt = new Date(y,m-1,d);
    const tom = new Date(todayObj); tom.setDate(tom.getDate()+1);
    if (str === toDateStr(tom)) return 'Mañana';
    return `${days_long[dt.getDay()]} ${d} de ${months_long[m-1]} ${y}`;
  }

  function formatDateFull(str) {
    const [y,m,d] = str.split('-').map(Number);
    const dt = new Date(y,m-1,d);
    return `${days_long[dt.getDay()]}, ${d} de ${months_long[m-1]} ${y}`;
  }

  document.getElementById('dateLabel').textContent =
    `${days_long[todayObj.getDay()]}, ${todayObj.getDate()} de ${months_long[todayObj.getMonth()]}`;

  // ── Shopping List ──
  let shopItems = JSON.parse(localStorage.getItem('midia_shop_items') || '[]');
  let shopFilter = 'todos';

  const shopCats = [
    { id: 'todos', label: '🧾 Todos' },
    { id: 'verduras', label: '🥦 Verduras' },
    { id: 'carnes', label: '🥩 Carnes' },
    { id: 'lacteos', label: '🧀 Lácteos' },
    { id: 'bebidas', label: '🥤 Bebidas' },
    { id: 'limpieza', label: '🧹 Limpieza' },
    { id: 'otros', label: '📦 Otros' },
  ];

  function renderShopCategories() {
    const el = document.getElementById('shopCategories');
    el.innerHTML = shopCats.map(c => `
      <button class="cat-btn ${shopFilter === c.id ? 'active' : ''}" onclick="setShopFilter('${c.id}')">${c.label}</button>
    `).join('');
  }

  function setShopFilter(cat) {
    shopFilter = cat;
    const found = shopCats.find(c => c.id === cat);
    document.getElementById('shopCatLabel').textContent = found ? found.label.replace(/^.\s/, '') : 'Todos';
    renderShopCategories();
    renderShopList();
  }

  function addShopItem() {
    const name = document.getElementById('shopItemName').value.trim();
    if (!name) {
      document.getElementById('shopItemName').style.borderColor = 'var(--high)';
      setTimeout(() => document.getElementById('shopItemName').style.borderColor = '', 1500);
      return;
    }
    const qty = document.getElementById('shopItemQty').value.trim() || '1';
    const cat = shopFilter === 'todos' ? 'otros' : shopFilter;

    shopItems.push({ id: Date.now(), name, qty, cat, checked: false });
    saveShopItems();
    renderShopList();
    updateShopStats();

    document.getElementById('shopItemName').value = '';
    document.getElementById('shopItemQty').value = '';
    document.getElementById('shopItemName').focus();
  }

  function toggleShopItem(id) {
    const item = shopItems.find(i => i.id === id);
    if (item) { item.checked = !item.checked; saveShopItems(); renderShopList(); updateShopStats(); }
  }

  function deleteShopItem(id) {
    shopItems = shopItems.filter(i => i.id !== id);
    saveShopItems();
    renderShopList();
    updateShopStats();
  }

  function clearChecked() {
    shopItems = shopItems.filter(i => !i.checked);
    saveShopItems();
    renderShopList();
    updateShopStats();
    showNotif('🗑 Ítems tachados eliminados');
  }

  function saveShopItems() {
    localStorage.setItem('midia_shop_items', JSON.stringify(shopItems));
  }

  function updateShopStats() {
    document.getElementById('shopTotal').textContent = shopItems.length;
    document.getElementById('shopPending').textContent = shopItems.filter(i => !i.checked).length;
  }

  function renderShopList() {
    const container = document.getElementById('shopList');
    const filtered = shopFilter === 'todos' ? shopItems : shopItems.filter(i => i.cat === shopFilter);

    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><p>No hay ítems.<br>Agregá algo arriba.</p></div>`;
      return;
    }

    // Split pending / checked
    const pending = filtered.filter(i => !i.checked);
    const checked = filtered.filter(i => i.checked);

    let html = '';
    if (pending.length) {
      html += pending.map(i => shopItemHTML(i)).join('');
    }
    if (checked.length) {
      html += `<div class="shop-section-title">Tachados</div>`;
      html += checked.map(i => shopItemHTML(i)).join('');
    }

    container.innerHTML = html;
  }

  function shopItemHTML(i) {
    const catEmoji = { verduras:'🥦', carnes:'🥩', lacteos:'🧀', bebidas:'🥤', limpieza:'🧹', otros:'📦' };
    return `<div class="shop-item ${i.checked ? 'checked' : ''}">
      <button class="shop-check" onclick="toggleShopItem(${i.id})">✓</button>
      <div class="shop-item-info">
        <div class="shop-item-name">${i.name}</div>
        <div class="shop-item-meta">${catEmoji[i.cat] || '📦'} ${i.cat}</div>
      </div>
      <span class="shop-item-qty">× ${i.qty}</span>
      <button class="delete-btn" onclick="deleteShopItem(${i.id})">✕</button>
    </div>`;
  }

  // ── Tab switching ──
  function switchTab(tab) {
    currentTab = tab;
    const tabNames = ['calendario','agenda','hoy','compras'];
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', tabNames[i] === tab));
    tabNames.forEach(v => {
      const el = document.getElementById('view-'+v);
      if (el) el.classList.toggle('hidden', v !== tab);
    });

    // Hide FAB on compras
    document.getElementById('mainFab').classList.toggle('hidden', tab === 'compras');

    if (tab === 'agenda') renderAgenda();
    if (tab === 'hoy') renderHoy();
    if (tab === 'calendario') renderCalendar();
    if (tab === 'compras') { renderShopCategories(); renderShopList(); updateShopStats(); }
  }

  function updateStats() {
    document.getElementById('totalCount').textContent = tasks.length;
    document.getElementById('doneCount').textContent = tasks.filter(t=>t.done).length;
    document.getElementById('upcomingCount').textContent = tasks.filter(t=>!t.done && (t.date||'') >= todayStr).length;
  }

  function changeMonth(dir) {
    calMonth += dir;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
  }

  function renderCalendar() {
    document.getElementById('calTitle').textContent = `${months_es[calMonth]} ${calYear}`;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    const pColors = { alta: 'var(--high)', media: 'var(--med)', baja: 'var(--low)' };

    days_es.forEach(d => {
      const el = document.createElement('div'); el.className = 'cal-day-label'; el.textContent = d; grid.appendChild(el);
    });

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div'); el.className = 'cal-cell empty'; grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayTasks = tasks.filter(t => t.date === dateStr);
      const cell = document.createElement('div');
      cell.className = 'cal-cell' + (dateStr===todayStr?' today':'') + (dateStr===selectedDate?' selected':'');
      cell.innerHTML = `<span>${d}</span>`;
      if (dayTasks.length) {
        const dots = document.createElement('div'); dots.className = 'dots';
        dayTasks.slice(0,3).forEach(t => {
          const pip = document.createElement('div'); pip.className = 'dot-pip'; pip.style.background = pColors[t.priority]; dots.appendChild(pip);
        });
        cell.appendChild(dots);
      }
      cell.onclick = () => { selectedDate = dateStr; renderCalendar(); };
      grid.appendChild(cell);
    }
    renderSelectedDay();
  }

  function renderSelectedDay() {
    document.getElementById('selectedDayTitle').textContent = formatDateFull(selectedDate);
    const container = document.getElementById('selectedDayTasks');
    const dayTasks = tasks.filter(t => t.date === selectedDate).sort((a,b) => (a.time||'99:99').localeCompare(b.time||'99:99'));
    container.innerHTML = dayTasks.length ? dayTasks.map(t => taskCardHTML(t)).join('') : `<div class="empty-state"><div class="empty-icon">✨</div><p>Sin tareas para este día</p></div>`;
  }

  function renderAgenda() {
    const container = document.getElementById('view-agenda');
    const sorted = [...tasks].sort((a,b) => ((a.date||'9999')+(a.time||'99:99')).localeCompare((b.date||'9999')+(b.time||'99:99')));
    const groups = {};
    sorted.forEach(t => { const key = t.date||'sin-fecha'; if (!groups[key]) groups[key]=[]; groups[key].push(t); });
    const keys = Object.keys(groups).sort((a,b) => { if(a==='sin-fecha')return 1; if(b==='sin-fecha')return -1; return a.localeCompare(b); });

    if (!keys.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>No hay tareas todavía.<br>Tocá <strong>+ Nueva tarea</strong> para empezar.</p></div>`;
      return;
    }

    container.innerHTML = keys.map(key => {
      const isToday = key === todayStr;
      const isPast = key < todayStr && key !== 'sin-fecha';
      const label = key === 'sin-fecha' ? 'Sin fecha' : formatDateLabel(key);
      return `<div class="agenda-group"><div class="agenda-date ${isToday?'today-label':''}" style="${isPast?'opacity:0.45':''}">${label}</div>${groups[key].map(t => taskCardHTML(t)).join('')}</div>`;
    }).join('');
  }

  function renderHoy() {
    const container = document.getElementById('view-hoy');
    const todayTasks = tasks.filter(t => t.date === todayStr || !t.date).sort((a,b) => (a.time||'99:99').localeCompare(b.time||'99:99'));
    container.innerHTML = todayTasks.length ? todayTasks.map(t => taskCardHTML(t)).join('') : `<div class="empty-state"><div class="empty-icon">⚡</div><p>No hay tareas para hoy.<br>¡Buen día libre!</p></div>`;
  }

  function taskCardHTML(t) {
    const al = t.alarm >= 1440 ? '1 día' : t.alarm >= 60 ? '1h' : t.alarm+'m';
    return `<div class="task-card ${t.priority} ${t.done?'done':''}" id="card-${t.id}">
      <button class="check-btn" onclick="toggleDone(${t.id})">✓</button>
      <div class="task-info">
        <div class="task-name">${t.name}</div>
        <div class="task-meta">
          ${t.time ? `<span>🕐 ${t.time}</span>` : ''}
          <span class="priority-tag ${t.priority}">${t.priority}</span>
          ${t.alarm > 0 ? `<span>🔔 ${al}</span>` : ''}
        </div>
      </div>
      <button class="delete-btn" onclick="deleteTask(${t.id})">✕</button>
    </div>`;
  }

  function openModal() {
    document.getElementById('taskDate').value = currentTab === 'calendario' ? selectedDate : todayStr;
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('taskName').focus(), 350);
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
  function handleOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

  function setPriority(p, btn) {
    selectedPriority = p;
    document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function saveTask() {
    const name = document.getElementById('taskName').value.trim();
    if (!name) { document.getElementById('taskName').style.borderColor = 'var(--high)'; setTimeout(() => document.getElementById('taskName').style.borderColor='',1500); return; }

    const task = {
      id: Date.now(), name, priority: selectedPriority,
      date: document.getElementById('taskDate').value || todayStr,
      time: document.getElementById('taskTime').value,
      alarm: parseInt(document.getElementById('taskAlarm').value),
      done: false
    };

    tasks.push(task);
    saveTasks();
    closeModal();
    renderAll();
    showNotif(`✅ "${name}" agregado`);

    document.getElementById('taskName').value = '';
    document.getElementById('taskTime').value = '';
    document.getElementById('taskAlarm').value = '0';
    selectedPriority = 'alta';
    document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.priority-btn.alta').classList.add('active');
  }

  function saveTasks() { localStorage.setItem('midia_v2_tasks', JSON.stringify(tasks)); }
  function toggleDone(id) { const t=tasks.find(t=>t.id===id); if(t){t.done=!t.done;saveTasks();renderAll();} }
  function deleteTask(id) { tasks=tasks.filter(t=>t.id!==id); saveTasks(); renderAll(); }

  function renderAll() {
    updateStats();
    if (currentTab==='calendario') renderCalendar();
    else if (currentTab==='agenda') renderAgenda();
    else if (currentTab==='hoy') renderHoy();
  }

  function showNotif(text) {
    document.getElementById('notifText').textContent = text;
    const b = document.getElementById('notifBanner');
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 3500);
  }

  // ── Init ──
  updateStats();
  renderAgenda(); // default tab is agenda

  document.getElementById('taskName').addEventListener('keydown', e => { if (e.key==='Enter') saveTask(); });
  document.getElementById('shopItemName').addEventListener('keydown', e => { if (e.key==='Enter') addShopItem(); });
</script>
</body>
</html>
